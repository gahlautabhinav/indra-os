version: "3.9"

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    build:
      context: ../apps/api
      target: development
    volumes:
      - ../apps/api:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://indra:indra_secret@postgres:5432/indra
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      JWT_SECRET: dev_secret_not_for_production
      JWT_ALGORITHM: HS256
      OTEL_ENDPOINT: http://otel-collector:4317
      CORS_ORIGINS: http://localhost:3000
    command: uvicorn indra.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ../apps/web
      target: development
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NODE_ENV: development
    command: npm run dev
