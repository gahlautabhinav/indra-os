version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: indra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: indra
      POSTGRES_USER: indra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-indra_secret}
    volumes:
      - indra_pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indra -d indra"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: indra_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - indra_redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: indra_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://indra:${POSTGRES_PASSWORD:-indra_secret}@postgres:5432/indra
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_ALGORITHM: RS256
      OTEL_ENDPOINT: http://otel-collector:4317
      CORS_ORIGINS: http://localhost:3000,http://web:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: indra_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: indra_otel
    restart: unless-stopped
    volumes:
      - ./otel-collector.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

volumes:
  indra_pgdata:
  indra_redis:

networks:
  default:
    name: indra_network
